<div class="po-row">
    <po-datepicker 
        class="po-md-2"
        name="dataInicio"
        p-label="Início"
        [(ngModel)]="dataInicio"
        (p-change)="onDataInicioChange($event)">
    </po-datepicker>

    <po-datepicker class="po-md-2"
        name="dataFim1"
        p-label="Fim"
        [(ngModel)]="dataFim1"
        (p-change)="onDataFimChange($event)">
    </po-datepicker>
     <po-input
        class="po-md-4"
        name="docSerie"
        [(ngModel)]="docSerie"
        p-label="Documento + Série"
        p-placeholder="Digite os 12 números"
        p-mask="999999999999">
    </po-input>
    <po-button
        class="po-md-2 buscar"
        p-label="Buscar"
        p-kind="primary"
        (p-click)="atualizarBordero()">
    </po-button>
</div>

<!-- Rodapé Fixo -->
<div class="rodape-fixo" *ngIf="totalBorderoSelecionadosFooter > 0">
  <div class="indicador-footer">
    <span class="indicador-label">Borderôs</span>
    <span class="indicador-valor">{{ totalBorderoSelecionadosFooter }}</span>
  </div>
  <div class="indicador-footer">
    <span class="indicador-label">Boletos</span>
    <span class="indicador-valor">{{ totalBoletosSelecionadoFooter | number:'1.2-2' }}</span>
  </div>
</div>

<div class="botoes-sticky">
  <po-button
      class="refresh"
      p-label="Atualizar"
      p-kind="secondary"
      (p-click)="onBuscarDoc()"
      >
  </po-button>
  <po-button
      class="refresh"
      p-label="Imprimir"
      p-kind="secondary"
      (p-click)="imprimirBor()"
      >
  </po-button>
</div>
<div class="container">
    <po-table
    [p-columns]="columns"
    [p-items]="bordero"
    p-striped="true"
    p-sort="true"
    [p-selectable]="true"
    [p-hide-columns-manager]="true"
    [p-hide-table-search]="false"
    (p-selected)="atualizarIndicadoresFooter()"
    (p-unselected)="atualizarIndicadoresFooter()"
    [p-loading]="loading"
    (p-show-more)="onShowMore()"
    [p-show-more-disabled]="!hasNext"
    >
    </po-table>
</div>
